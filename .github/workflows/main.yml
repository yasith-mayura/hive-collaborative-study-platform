# .github/workflows/ci.yml

name: CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run workflow on'
        required: true
        default: 'staging-grounds'

jobs:
  test-compose:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Step 1: Checkout
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.branch }}    

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Create .env file from secrets & variables
        working-directory: hive
        run: |
          cat <<EOF > .env
          # Mongo
          MONGO_URI=${{ secrets.MONGO_URI }}

          # Firebase (backend services)
          FIREBASE_PROJECT_ID=${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}

          # RAG
          RAG_SERVICE_URL=${{ vars.RAG_SERVICE_URL }}

          # Firebase (frontend / Vite)
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ vars.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_API_GATEWAY_URL=${{ vars.VITE_API_GATEWAY_URL }}
          VITE_BASE_URL=${{ vars.VITE_BASE_URL }}
          EOF

      - name: Build & start all services
        working-directory: hive
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.override.ci.yml \
            up --build --detach

      - name: Wait for frontend to be healthy
        working-directory: hive
        run: |
          echo "Waiting for all services to report healthy..."
          timeout 120 bash -c \
            'until [ "$(docker compose ps --status healthy | grep -c healthy)" -ge 6 ]; do
              echo "Still waiting..."; sleep 5;
            done'

      - name: Smoke test — check each service health endpoint
        working-directory: hive
        run: |
          declare -A SERVICES=(
            [auth-service]=3000
            [user-service]=3001
            [resource-service]=3002
            [chat-service]=3003
            [note-service]=3004
            [progress-service]=3005
            [session-service]=3006
            [rag-service]=8000
          )

          for svc in "${!SERVICES[@]}"; do
            port="${SERVICES[$svc]}"
            container=$(docker compose ps -q "$svc")
            echo -n "Checking $svc ... "
            docker exec "$container" curl -sf "http://localhost:$port/health" \
              && echo "OK" \
              || (echo "FAILED" && exit 1)
          done

          echo -n "Checking frontend ... "
          curl -sf http://localhost:8080 && echo "OK" || (echo "FAILED" && exit 1)

      - name: Print logs on failure
        working-directory: hive
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.override.ci.yml \
            logs --no-color --tail=50

      - name: Tear down
        working-directory: hive
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.override.ci.yml \
            down --volumes --remove-orphans
