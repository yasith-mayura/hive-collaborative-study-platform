name: Full Stack CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run workflow on'
        required: true
        default: 'staging-grounds'
jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:24.0.6-dind
        options: --privileged
        ports:
          - 2375:2375

    steps:
      # Step 1: Checkout
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.branch }}

      # Step 2: Set up Docker Buildx
      - uses: docker/setup-buildx-action@v4.0.0r

    #   # Step 3: Login to Docker
    #   - uses: docker/login-action@v3
    #     with:
    #       username: ${{ secrets.DOCKER_USERNAME }}
    #       password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build all CI images
      - name: Build CI images
        run: docker compose -f docker-compose.yml -f docker-compose.override.ci.yml build

      # Step 5: Start CI services
      - name: Start CI services
        run: docker compose -f docker-compose.yml -f docker-compose.override.ci.yml up -d

      # Step 6: Wait for all services healthy
      - name: Wait for services
        run: |
          echo "Waiting for all services to be healthy..."
          for i in {1..30}; do
            HEALTHY=$(docker compose -f docker-compose.yml -f docker-compose.override.ci.yml ps | grep healthy | wc -l)
            TOTAL=$(docker compose -f docker-compose.yml -f docker-compose.override.ci.yml ps | grep -v Name | wc -l)
            if [ "$HEALTHY" -eq "$TOTAL" ]; then
              echo "All services are healthy!"
              exit 0
            fi
            echo "Waiting 5s..."
            sleep 5
          done
          echo "Some services failed health check"
          docker compose -f docker-compose.yml -f docker-compose.override.ci.yml ps
          exit 1

      # Step 7: Run backend tests in parallel
      - name: Run backend tests
        run: |
          echo "Running backend tests..."
          services=(auth-service user-service resource-service chat-service note-service progress-service session-service rag-service)
          for svc in "${services[@]}"; do
            echo "Testing $svc..."
            docker compose -f docker-compose.yml -f docker-compose.override.ci.yml exec -T $svc npm test &
          done
          wait

      # Step 8: Run frontend E2E tests
      - name: Run frontend E2E tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.ci.yml exec -T frontend npm install
          docker compose -f docker-compose.yml -f docker-compose.override.ci.yml exec -T frontend npx cypress run

      # Step 9: Tear down CI services
      - name: Tear down CI
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.override.ci.yml down --volumes
