name: CD

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. sha-abc1234 or latest)'
        required: false
        default: 'latest'
      branch:
        description: 'Branch to run workflow on'
        required: true
        default: 'staging-grounds'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build & Push images to ECR
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🏗️ Build & Push to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout battlefield
        uses: actions/checkout@v4
        with:
          ref: battlefield

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event.inputs.image_tag }}" = "latest" ]; then
            TAG="sha-$(git rev-parse --short HEAD)"
          else
            TAG="${{ github.event.inputs.image_tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push all service images
        working-directory: hive
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          services=(
            auth-service
            user-service
            resource-service
            chat-service
            note-service
            progress-service
            session-service
            rag-service
          )

          for svc in "${services[@]}"; do
            echo "==> Building $svc..."
            docker buildx build \
              --platform linux/amd64 \
              --push \
              --tag "$ECR_REGISTRY/hive/$svc:$IMAGE_TAG" \
              --tag "$ECR_REGISTRY/hive/$svc:latest" \
              --cache-from type=registry,ref="$ECR_REGISTRY/hive/$svc:latest" \
              --cache-to type=inline \
              "./services/$svc"
          done

          # Frontend is in a different directory
          echo "==> Building frontend..."
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag "$ECR_REGISTRY/hive/frontend:$IMAGE_TAG" \
            --tag "$ECR_REGISTRY/hive/frontend:latest" \
            --cache-from type=registry,ref="$ECR_REGISTRY/hive/frontend:latest" \
            --cache-to type=inline \
            --build-arg VITE_FIREBASE_API_KEY="${{ secrets.VITE_FIREBASE_API_KEY }}" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg VITE_FIREBASE_PROJECT_ID="${{ vars.FIREBASE_PROJECT_ID }}" \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET="${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID="${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg VITE_FIREBASE_APP_ID="${{ secrets.VITE_FIREBASE_APP_ID }}" \
            --build-arg VITE_FIREBASE_MEASUREMENT_ID="${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}" \
            --build-arg VITE_BASE_URL="${{ vars.VITE_BASE_URL }}" \
            --build-arg VITE_API_GATEWAY_URL="${{ vars.VITE_API_GATEWAY_URL }}" \
            "./frontend"

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy to EC2
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-push

    steps:
      - name: Checkout battlefield
        uses: actions/checkout@v4
        with:
          ref: battlefield

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "hive/docker-compose.yml,hive/docker-compose.prod.yml,hive/deploy.sh"
          target: "/home/ubuntu/hive"
          strip_components: 1

      - name: Run deploy script on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 300s
          script: |
            chmod +x /home/ubuntu/hive/deploy.sh
            /home/ubuntu/hive/deploy.sh \
              "${{ secrets.ECR_REGISTRY }}" \
              "${{ needs.build-and-push.outputs.image_tag }}" \
              "${{ secrets.AWS_REGION }}"

 
