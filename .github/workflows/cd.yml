name: CD

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. sha-abc1234 or latest)'
        required: false
        default: 'latest'
      branch:
        description: 'Branch to run workflow on'
        required: true
        default: 'staging-grounds'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build & Push images to ECR
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🏗️ Build & Push to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout battlefield
        uses: actions/checkout@v4
        with:
          ref: battlefield

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event.inputs.image_tag }}" = "latest" ]; then
            TAG="sha-$(git rev-parse --short HEAD)"
          else
            TAG="${{ github.event.inputs.image_tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push all service images
        working-directory: hive
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          services=(
            auth-service
            user-service
            resource-service
            chat-service
            note-service
            progress-service
            session-service
            rag-service
          )

          for svc in "${services[@]}"; do
            echo "==> Building $svc..."
            docker buildx build \
              --platform linux/amd64 \
              --push \
              --tag "$ECR_REGISTRY/hive/$svc:$IMAGE_TAG" \
              --tag "$ECR_REGISTRY/hive/$svc:latest" \
              --cache-from type=registry,ref="$ECR_REGISTRY/hive/$svc:latest" \
              --cache-to type=inline \
              "./services/$svc"
          done

          # Frontend is in a different directory
          echo "==> Building frontend..."
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag "$ECR_REGISTRY/hive/frontend:$IMAGE_TAG" \
            --tag "$ECR_REGISTRY/hive/frontend:latest" \
            --cache-from type=registry,ref="$ECR_REGISTRY/hive/frontend:latest" \
            --cache-to type=inline \
            "./frontend"

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy to EC2
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-push

    steps:
      - name: Checkout battlefield
        uses: actions/checkout@v4
        with:
          ref: battlefield

    #   - name: Copy compose files to EC2
    #     uses: appleboy/scp-action@v0.1.7
    #     with:
    #       host: ${{ secrets.EC2_HOST }}
    #       username: ${{ secrets.EC2_USER }}
    #       key: ${{ secrets.EC2_SSH_KEY }}
    #       source: "hive/docker-compose.yml,hive/docker-compose.prod.yml,hive/deploy.sh"
    #       target: "/home/ubuntu/"
    #       strip_components: 1

      - name: Run deploy script on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 300s
          script: |
            chmod +x /home/ubuntu/hive/deploy.sh
            /home/ubuntu/hive/deploy.sh \
              "${{ secrets.ECR_REGISTRY }}" \
              "${{ needs.build-and-push.outputs.image_tag }}" \
              "${{ secrets.AWS_REGION }}"

  # ─────────────────────────────────────────────
  # JOB 3 — Health Check live server
  # ─────────────────────────────────────────────
  health-check:
    name: 🩺 Live Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy

    steps:
      - name: Wait for services to stabilize
        run: sleep 20

      - name: Check live endpoints
        run: |
          BASE="http://${{ secrets.EC2_HOST }}"

          echo "Checking frontend..."
          curl -sf --retry 5 --retry-delay 5 "$BASE" && echo "✅ frontend OK" || echo "❌ frontend FAILED"

          # Internal service health checks via EC2 SSH
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/hive
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"

            declare -A PORTS=(
              [auth-service]=3000
              [user-service]=3001
              [resource-service]=3002
              [chat-service]=3003
              [note-service]=3004
              [progress-service]=3005
              [session-service]=3006
              [rag-service]=8000
            )

            FAILED=0
            for svc in "${!PORTS[@]}"; do
              port="${PORTS[$svc]}"
              container=$($COMPOSE ps -q "$svc")
              if docker exec "$container" curl -sf "http://localhost:$port/health" > /dev/null; then
                echo "✅ $svc OK"
              else
                echo "❌ $svc FAILED"
                FAILED=1
              fi
            done

            exit $FAILED

  # ─────────────────────────────────────────────
  # JOB 4 — Logs & Artifacts
  # ─────────────────────────────────────────────
  logs-and-artifacts:
    name: 📋 Logs & Artifacts
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy, health-check]
    if: always()

    steps:
      - name: Collect logs from EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/hive
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              logs --no-color --tail=50 > /tmp/deploy-logs.txt
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              ps >> /tmp/deploy-logs.txt

      - name: Download logs from EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "/tmp/deploy-logs.txt"
          target: "logs/"
          strip_components: 2

      - name: Upload logs artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs-${{ needs.build-and-push.outputs.image_tag }}
          path: logs/deploy-logs.txt
          retention-days: 14

      - name: Write job summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ needs.build-and-push.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Server | \`${{ secrets.EC2_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
