# ─── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ─── Upstreams ─────────────────────────────────────────────────────────────────
upstream us-user-service     { server user-service:3001;     keepalive 32; }
upstream us-auth-service     { server auth-service:3000;     keepalive 32; }
upstream us-resource-service { server resource-service:3002; keepalive 32; }
upstream us-session-service  { server session-service:3006;  keepalive 32; }
upstream us-chat-service     { server chat-service:3003;     keepalive 32; }
upstream us-progress-service { server progress-service:3005; keepalive 32; }
upstream us-rag-service { server rag-service:8000; keepalive 32; }
upstream us-note-service  { server note-service:3004;    keepalive 32; }  # ← uncomment & set port
upstream us-notification-service  { server notification-service:3007;    keepalive 32; }  # ← uncomment & set port

# ─── Shared proxy snippet (inlined since we're using one file) ─────────────────
# Used via map trick below — actual headers are repeated per-location but
# we keep them grouped at the top as a reference block in comments:
#
#   proxy_connect_timeout 60s;
#   proxy_send_timeout    60s;
#   proxy_read_timeout    60s;
#   send_timeout          60s;
#   proxy_http_version    1.1;
#   proxy_set_header Connection        "";          ← enables keepalive to upstreams
#   proxy_set_header Host              $http_host;
#   proxy_set_header X-Real-IP         $remote_addr;
#   proxy_set_header X-Forwarded-Host  $http_host;
#   proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
#   proxy_set_header X-Forwarded-Proto $scheme;
#   proxy_redirect   http:// $scheme://;
#
#   limit_req  zone=api_limit burst=20 nodelay;
#   limit_conn conn_limit 20;
#
#   add_header X-Frame-Options          "DENY"                          always;
#   add_header X-Content-Type-Options   "nosniff"                       always;
#   add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
#   add_header X-XSS-Protection         "1; mode=block"                 always;

# ────────────────────────────────────────────────────────────────────────────────
# HTTP Server - Only for Let's Encrypt challenges + redirect to HTTPS
# ────────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name ${NGINX_APP0_DOMAIN};

    # ── Global hardening ────────────────────────────────────────────────────────
    server_tokens     off;
    merge_slashes     off;        # preserve encoded slashes like SE%2F2020%2F019
    client_max_body_size 10M;
    client_body_timeout  30s;     # 300s is dangerously high — opens slowloris attacks
    send_timeout         30s;

    # ── SPA static files ────────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }

    # ── Session service ──────────────────────────────────────────────────────────
    location /api/studysession {
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        send_timeout          60s;
        proxy_http_version    1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect   http:// $scheme://;
        limit_req  zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 20;
        add_header X-Frame-Options          "DENY"                             always;
        add_header X-Content-Type-Options   "nosniff"                          always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
        add_header X-XSS-Protection         "1; mode=block"                    always;

        proxy_pass http://us-session-service;
    }

    location /api/sessions {
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
