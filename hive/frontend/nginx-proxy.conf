# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;


# Hive service.
upstream us-user-service {
  server user-service:3001;
}

upstream us-auth-service {
  server auth-service:3000;
}

upstream us-resource-service {
  server resource-service:3002;
}

upstream us-session-service {
  server session-service:3006;
}

upstream us-chat-service {
  server chat-service:3003;
}


server {
  listen 80;
  server_name ${NGINX_APP0_DOMAIN};
  client_body_timeout 300;
  send_timeout 300;

  root /usr/share/nginx/html;  # root set for the whole server
    index index.html index.htm;   # default index files

    location / {
        try_files $uri /index.html;
    }


    location /api/studysession/ {
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Mod 
        # Rate limit
        limit_req zone=api_limit burst=20 nodelay;

        # Limit concurrent connections
        limit_conn conn_limit 20;
        
        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Mod End
        proxy_pass http://us-session-service/api/studysession/;

        proxy_redirect http:// $scheme://;
    }

    location /api/sessions/ {
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Mod 
        # Rate limit
        limit_req zone=api_limit burst=20 nodelay;

        # Limit concurrent connections
        limit_conn conn_limit 20;
        
        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Mod End
        proxy_pass http://us-session-service/api/sessions/;

        proxy_redirect http:// $scheme://;
    }

    location /api/chat/ {
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Mod 
        # Rate limit
        limit_req zone=api_limit burst=20 nodelay;

        # Limit concurrent connections
        limit_conn conn_limit 20;
        
        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Mod End
        proxy_pass http://us-chat-service/api/chat/;

        proxy_redirect http:// $scheme://;
    }

    
    location /socket.io/ {
        proxy_pass http://us-chat-service;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /api/ {
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Mod 
        # Rate limit
        limit_req zone=api_limit burst=20 nodelay;

        # Limit concurrent connections
        limit_conn conn_limit 20;
        
        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Mod End
        proxy_pass http://us-user-service/api/;

        proxy_redirect http:// $scheme://;
    }



    location /auth/ {
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Mod 
        # Rate limit
        limit_req zone=api_limit burst=20 nodelay;

        # Limit concurrent connections
        limit_conn conn_limit 20;
        
        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ✅ CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials true always;

        # ✅ Handle preflight OPTIONS requests immediately
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept";
            add_header Access-Control-Allow-Credentials true;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # Mod End
        proxy_pass http://us-auth-service/auth/;

        proxy_redirect http:// $scheme://;
    }

    location /resources/ {
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Mod 
        # Rate limit
        limit_req zone=api_limit burst=20 nodelay;

        # Limit concurrent connections
        limit_conn conn_limit 20;
        
        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Mod End
        proxy_pass http://us-resource-service/resources/;

        proxy_redirect http:// $scheme://;
    }

}
