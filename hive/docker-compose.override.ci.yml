# docker-compose.override.ci.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.ci.yml up --build
services:
  auth-service:
    restart: "no"
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  user-service:
    restart: "no"
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  resource-service:
    restart: "no"
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  chat-service:
    restart: "no"
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  note-service:
    restart: "no"
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  progress-service:
    restart: "no"
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  session-service:
    restart: "no"
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  rag-service:
    restart: "no"
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    

  frontend:
    restart: "no"
    ports:
      - "8080:80"
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    environment:
      PGVECTOR_HOST: pgvector
      PGVECTOR_PORT: 5432
      PGVECTOR_DATABASE: hive_vectors
      PGVECTOR_USER: hive_user
      PGVECTOR_PASSWORD: hive_pass
      
  pgvector:
    restart: "no"
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    environment:
      POSTGRES_USER: hive_user
      POSTGRES_PASSWORD: hive_pass
      POSTGRES_DB: hive_vectors
    volumes:
    - pgvector_data:/var/lib/postgresql/data
    - ./init/pgvector-init.sql:/docker-entrypoint-initdb.d/01-init.sql
