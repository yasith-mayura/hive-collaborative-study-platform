  # api-gateway:
  #   build: ./services/api-gateway
  #   env_file: .env
  #   environment:
  #     - PORT=4000
  #   ports:
  #     - "4000:4000"
  #   depends_on:
  #     mongo:
  #       condition: service_healthy
  #   restart: on-failure
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
