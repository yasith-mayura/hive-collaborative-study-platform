version: "3.8"
services:
  # mongo:
  #   image: mongo:6
  #   restart: unless-stopped
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongo-data:/data/db
  #   healthcheck:
  #     test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 40s

  # api-gateway:
  #   build: ./services/api-gateway
  #   env_file: .env
  #   environment:
  #     - PORT=4000
  #   ports:
  #     - "4000:4000"
  #   depends_on:
  #     mongo:
  #       condition: service_healthy
  #   restart: on-failure
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 30s

  auth-service:
    build: ./services/auth-service
    env_file: .env
    environment:
      - PORT=3000
    # ports:
    #   - "3000:3000"
    networks:
      local:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  user-service:
    build: ./services/user-service
    env_file: .env
    environment:
      - PORT=3001
    # ports:
    #   - "3001:3001"
    networks:
      local:

    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  resource-service:
    build: ./services/resource-service
    env_file: .env
    environment:
      - PORT=3002
      # - MONGO_URI=mongodb://mongo:27017/hive
      - RAG_SERVICE_URL=http://rag-service:8000
      # AWS credentials are read from .env via env_file above
      # S3_BUCKET_NAME, AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
    ports:
      - "3002:3002"
    networks:
      local:
    depends_on:
      rag-service:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  chat-service:
    build: ./services/chat-service
    env_file: .env
    environment:
      - PORT=3003
    ports:
      - "3003:3003"
    networks:
      local:
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  note-service:
    build: ./services/note-service
    env_file: .env
    environment:
      - PORT=3004
    ports:
      - "3004:3004"
    depends_on:
      frontend:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  progress-service:
    build: ./services/progress-service
    env_file: .env
    environment:
      - PORT=3005
    ports:
      - "3005:3005"
    depends_on:
      frontend:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  session-service:
    build: ./services/session-service
    env_file: .env
    environment:
      - PORT=3006
    ports:
      - "3006:3006"
    networks:
      local:
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rag-service:
    build: ./services/rag-service
    env_file: .env
    environment:
      - PORT=8000
    ports:
      - "8000:8000"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    # profiles:
    #   - current
    build: ./frontend
    env_file: .env
    # environment:
      # - PORT=5173
    ports:
      - "80:80"
    networks:
      local:
    depends_on:
      user-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      resource-service:
        condition: service_healthy
      session-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# volumes:
#   mongo-data:

networks:
  # Connects all commons serices (Certbot, Nginx, pgAdmin, Chatbot and Django).
  local:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-local
    ipam:
      config:
        - subnet: '172.31.206.0/25'
          gateway: '172.31.206.1'

