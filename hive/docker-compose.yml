  auth-service:
    build: ./services/auth-service
    # env_file: .env
    environment:
      PORT: 3000
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}


    # ports:
    #   - "3000:3000"
    networks:
      local:
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  user-service:
    build: ./services/user-service
    environment:
      PORT: 3001
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
    # ports:
    #   - "3001:3001"
    networks:
      local:

    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  resource-service:
    build: ./services/resource-service
    environment:
      PORT: 3002
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      AWS_ACCESS_KEY_ID: ${S3_AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${S3_AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${S3_AWS_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      
      # - MONGO_URI=mongodbenvironment:://mongo:27017/hive
      # AWS credentials are read from .env via env_file above
      # S3_BUCKET_NAME, AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
    # ports:
    #   - "3002:3002"
    networks:
      local:
    # depends_on:
    #   rag-service:
    #     condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  chat-service:
    build: ./services/chat-service
    environment:
      PORT: 3003
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
    # ports:
    #   - "3003:3003"
    networks:
      local:
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  note-service:
    build: ./services/note-service
    environment:
      PORT: 3004
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
    # ports:
    #   - "3004:3004"
    networks:
      local:
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  progress-service:
    build: ./services/progress-service
    environment:
      PORT: 3005
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
    # ports:
    #   - "3005:3005"
    networks:
      local:
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  session-service:
    build: ./services/session-service
    environment:
      PORT: 3006
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
    # ports:
    #   - "3006:3006"
    networks:
      local:
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  rag-service:
    build: ./services/rag-service
    environment:
      PORT: 8000
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PGVECTOR_HOST: ${PGVECTOR_HOST}
      PGVECTOR_PORT: ${PGVECTOR_PORT}
      PGVECTOR_DATABASE: ${PGVECTOR_DATABASE}
      PGVECTOR_USER: ${PGVECTOR_USER}
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD}
      AWS_ACCESS_KEY_ID: ${S3_AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${S3_AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${S3_AWS_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS}
      GEMINI_MODEL: ${GEMINI_MODEL}
      TOP_K_CHUNKS: ${TOP_K_CHUNKS}
      MIN_SIMILARITY_SCORE: ${MIN_SIMILARITY_SCORE}
      CHUNK_SIZE: ${CHUNK_SIZE}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP}
      RESOURCE_SERVICE_URL: ${RESOURCE_SERVICE_URL}
      OUT_OF_SYLLABUS_THRESHOLD: ${OUT_OF_SYLLABUS_THRESHOLD}


    # ports:
    #   - "8000:8000"
    networks:
      local:
    depends_on:
      pgvector:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  notification-service:
    build: ./services/notification-service
    env_file: .env
    environment:
      PORT: 3007
      MONGO_URI: ${MONGO_URI}
      USER_SERVICE_URL: http://user-service:3001
      SESSION_SERVICE_URL: http://session-service:3006
      NOTIFICATION_SERVICE_URL: http://notification-service:3007
    ports:
      - "3007:3007"
    networks:
      local:
    depends_on:
      user-service:
        condition: service_healthy
      session-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s


  certbot:
    image: certbot/dns-google:latest
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Renew automatically — run every 12h, renews when <30 days left
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"
    networks:
      local:

  frontend:
    build: ./frontend
    environment:
  # frontend:
  #   build:
  #     context: ./frontend
  #     args:
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
      VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
      VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
      VITE_API_GATEWAY_URL: ${VITE_API_GATEWAY_URL}
      VITE_AUTH_SERVICE_URL: ${VITE_BASE_URL}
      VITE_USER_SERVICE_URL: ${VITE_BASE_URL}
      VITE_RESOURCE_SERVICE_URL: ${VITE_BASE_URL}
      VITE_CHAT_SERVICE_URL: ${VITE_BASE_URL}
      VITE_NOTE_SERVICE_URL: ${VITE_BASE_URL}
      VITE_PROGRESS_SERVICE_URL: ${VITE_BASE_URL}
      VITE_SESSION_SERVICE_URL: ${VITE_BASE_URL}
      VITE_RAG_SERVICE_URL: ${VITE_BASE_URL}
      VITE_NOTIFICATION_SERVICE_URL: ${VITE_BASE_URL}
      NGINX_APP0_DOMAIN: ${NGINX_APP0_DOMAIN}  
      
    volumes:
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      local:
    depends_on:
      user-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      resource-service:
        condition: service_healthy
      session-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      pgvector:
        condition: service_healthy
      progress-service:
        condition: service_healthy
      note-service:
        condition: service_healthy
      rag-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  pgvector:
    image: pgvector/pgvector:pg16
    # build: ./services/pgvector
    container_name: hive-pgvector
    environment:
      POSTGRES_USER: ${PGVECTOR_USER}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD}
      POSTGRES_DB: ${PGVECTOR_DATABASE}
    # ports:
    #   - "5432:5432"
    networks:
      local:
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./init/pgvector-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER} -d ${PGVECTOR_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    

volumes:
  pgvector_data:
  certbot-webroot:
  certbot-certs:



networks:
  # Connects all commons serices (Certbot, Nginx, pgAdmin, Chatbot and Django).
  local:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-local
    ipam:
      config:
        - subnet: '172.31.206.0/25'
          gateway: '172.31.206.1'

