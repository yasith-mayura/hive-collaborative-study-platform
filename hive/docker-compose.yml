  auth-service:
    build: ./services/auth-service
    # env_file: .env
    environment:
      PORT: 3000
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}


    # ports:
    #   - "3000:3000"
    networks:
      local:
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  user-service:
    build: ./services/user-service
    environment:
      PORT: 3001
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
    # ports:
    #   - "3001:3001"
    networks:
      local:

    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  resource-service:
    build: ./services/resource-service
    environment:
      PORT: 3002
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
      
      # - MONGO_URI=mongodbenvironment:://mongo:27017/hive
      # AWS credentials are read from .env via env_file above
      # S3_BUCKET_NAME, AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
    # ports:
    #   - "3002:3002"
    networks:
      local:
    depends_on:
      rag-service:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  chat-service:
    build: ./services/chat-service
    environment:
      PORT: 3003
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
    # ports:
    #   - "3003:3003"
    networks:
      local:
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  note-service:
    build: ./services/note-service
    environment:
      PORT: 3004
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
    # ports:
    #   - "3004:3004"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  progress-service:
    build: ./services/progress-service
    environment:
      PORT: 3005
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
    # ports:
    #   - "3005:3005"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  session-service:
    build: ./services/session-service
    environment:
      PORT: 3006
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
    # ports:
    #   - "3006:3006"
    networks:
      local:
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rag-service:
    build: ./services/rag-service
    environment:
      PORT: 8000
      MONGO_URI: ${MONGO_URI}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
    # ports:
    #   - "8000:8000"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    # profiles:
    #   - current
    build: ./frontend
    environment:
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
      VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
      VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
      VITE_API_GATEWAY_URL: ${VITE_API_GATEWAY_URL}
      VITE_AUTH_SERVICE_URL: ${VITE_BASE_URL}
      VITE_USER_SERVICE_URL: ${VITE_BASE_URL}
      VITE_RESOURCE_SERVICE_URL: ${VITE_BASE_URL}
      VITE_CHAT_SERVICE_URL: ${VITE_BASE_URL}
      VITE_NOTE_SERVICE_URL: ${VITE_BASE_URL}
      VITE_PROGRESS_SERVICE_URL: ${VITE_BASE_URL}
      VITE_SESSION_SERVICE_URL: ${VITE_BASE_URL}
      VITE_RAG_SERVICE_URL: ${VITE_BASE_URL}
    ports:
      - "80:80"
    networks:
      local:
    depends_on:
      user-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      resource-service:
        condition: service_healthy
      session-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s



networks:
  # Connects all commons serices (Certbot, Nginx, pgAdmin, Chatbot and Django).
  local:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-local
    ipam:
      config:
        - subnet: '172.31.206.0/25'
          gateway: '172.31.206.1'

