services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${PGVECTOR_USER:-postgres}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-postgres}
      POSTGRES_DB: ${PGVECTOR_DATABASE:-hive_vectors}
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-postgres} -d ${PGVECTOR_DATABASE:-hive_vectors}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-service:
    build: .
    env_file:
      - .env
    environment:
      PORT: 8000
      PGVECTOR_HOST: pgvector
      PGVECTOR_PORT: 5432
      PGVECTOR_DATABASE: ${PGVECTOR_DATABASE:-hive_vectors}
      PGVECTOR_USER: ${PGVECTOR_USER:-postgres}
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD:-postgres}
      RESOURCE_SERVICE_URL: http://resource-service:3002
    ports:
      - "8000:8000"
    depends_on:
      pgvector:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgvector_data:
